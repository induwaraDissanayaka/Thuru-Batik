<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Orders - Batik Lanka Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <a href="../index.html" class="logo" style="color:white"><div class="logo-icon">BL</div><span>Batik Lanka</span></a>
      <ul class="admin-nav">
        <li><a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
        <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
        <li><a href="orders.html" class="active"><i class="fas fa-shopping-bag"></i> Orders</a></li>
        <li><a href="customers.html"><i class="fas fa-users"></i> Customers</a></li>
        <li><a href="reviews.html"><i class="fas fa-star"></i> Reviews</a></li>
        <li><a href="messages.html"><i class="fas fa-envelope"></i> Messages</a></li>
        <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
        <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
      </ul>
    </aside>
    <main class="admin-main">
      <h1 style="margin-bottom:2rem">Orders</h1>
      <div style="display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap">
        <button class="btn btn-primary btn-sm" onclick="filterAdminOrders('all')">All (156)</button>
        <button class="btn btn-secondary btn-sm" onclick="filterAdminOrders('pending')">Pending (12)</button>
        <button class="btn btn-secondary btn-sm" onclick="filterAdminOrders('processing')">Processing (28)</button>
        <button class="btn btn-secondary btn-sm" onclick="filterAdminOrders('completed')">Completed (105)</button>
        <button class="btn btn-secondary btn-sm" onclick="filterAdminOrders('cancelled')">Cancelled (11)</button>
      </div>
      <div class="glass-card" style="padding:1.5rem">
        <div style="overflow-x:auto">
          <table class="data-table">
            <thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
            <tbody>
              <tr><td>#ORD-001</td><td>John Doe<br><small style="color:var(--text-muted)">john@example.com</small></td><td>2 items</td><td>LKR 17,000</td><td>COD</td><td><span class="status-badge status-pending">Pending</span></td><td>2026-06-28</td><td><select class="form-input" style="padding:0.3rem;font-size:0.85rem" onchange="updateOrderStatus('1',this.value)"><option value="pending" selected>Pending</option><option value="processing">Processing</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <script src="../js/main.js"></script>
  <script>
    function filterAdminOrders(status){Toast.info('Filtering by: '+status);}
    function updateOrderStatus(id,status){Toast.success('Order status updated to '+status);}
  </script>
</body>
</html>
