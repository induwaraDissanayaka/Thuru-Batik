<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist - Batik Lanka</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<section class="section" style="padding-top:2rem">
<h1 class="section-title" data-i18n="nav.wishlist">Wishlist</h1>

<div id="wishlistContent">
<!-- Wishlist rendered by JS -->
</div>
</section>

<div id="footer-container"></div>

<script src="js/main.js"></script>
<script>
document.getElementById('navbar-container').innerHTML = renderNavbar();
document.getElementById('footer-container').innerHTML = renderFooter();

function renderWishlist() {
const container = document.getElementById('wishlistContent');

if (State.wishlist.length === 0) {
container.innerHTML = &lt;div style="text-align:center;padding:4rem"&gt; &lt;i class="fas fa-heart" style="font-size:4rem;color:var(--text-muted);margin-bottom:1rem"&gt;&lt;/i&gt; &lt;h2&gt;Your wishlist is empty&lt;/h2&gt; &lt;p style="color:var(--text-muted);margin-bottom:2rem"&gt;Save your favorite items here&lt;/p&gt; &lt;a href="products.html" class="btn btn-primary btn-lg"&gt;Browse Products&lt;/a&gt; &lt;/div&gt;;
return;
}

container.innerHTML = <div class="products-grid"&gt;${State.wishlist.map(p =&gt; UI.renderProductCard(p)).join('')}&lt;/div>;
initScrollAnimations();
}

EventBus.on('wishlist:updated', renderWishlist);
renderWishlist();
</script>
</body>
</html>
