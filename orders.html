<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders - Batik Lanka</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="section" style="padding-top:2rem">
    <h1 class="section-title" data-i18n="orders.title">My Orders</h1>

    <div style="display:flex;gap:1rem;margin-bottom:2rem;flex-wrap:wrap">
      <button class="btn btn-primary btn-sm" onclick="filterOrders('all')">All</button>
      <button class="btn btn-secondary btn-sm" onclick="filterOrders('pending')">Pending</button>
      <button class="btn btn-secondary btn-sm" onclick="filterOrders('processing')">Processing</button>
      <button class="btn btn-secondary btn-sm" onclick="filterOrders('completed')">Completed</button>
      <button class="btn btn-secondary btn-sm" onclick="filterOrders('cancelled')">Cancelled</button>
    </div>

    <div id="ordersList">
      <!-- Orders rendered by JS -->
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();
    document.getElementById('footer-container').innerHTML = renderFooter();

    const mockOrders = [
      { id: 'order_001', createdAt: new Date('2026-06-25'), status: 'completed', total: 12500, items: [{name: 'Traditional Kandyan Batik Saree', qty: 1}] },
      { id: 'order_002', createdAt: new Date('2026-06-27'), status: 'processing', total: 7300, items: [{name: 'Hand Painted Batik Shirt', qty: 1}, {name: 'Batik Scarf', qty: 1}] },
      { id: 'order_003', createdAt: new Date('2026-06-28'), status: 'pending', total: 8500, items: [{name: 'Batik Wall Hanging', qty: 1}] }
    ];

    function renderOrders(orders) {
      const container = document.getElementById('ordersList');
      if (orders.length === 0) {
        container.innerHTML = `<div style="text-align:center;padding:3rem"><i class="fas fa-box-open" style="font-size:3rem;color:var(--text-muted);margin-bottom:1rem"></i><h3>No orders found</h3></div>`;
        return;
      }
      container.innerHTML = orders.map(o => UI.renderOrderCard(o)).join('');
    }

    function filterOrders(status) {
      if (status === 'all') {
        renderOrders(mockOrders);
      } else {
        renderOrders(mockOrders.filter(o => o.status === status));
      }
    }

    renderOrders(mockOrders);
  </script>
</body>
</html>
