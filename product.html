<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Batik Lanka</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="section" style="padding-top:2rem">
    <div id="productDetail">
      <!-- Product detail rendered by JS -->
    </div>
  </section>

  <!-- Related Products -->
  <section class="section" style="background:var(--bg-secondary)">
    <div class="section-header">
      <h2 class="section-title" data-i18n="products.related_products">Related Products</h2>
    </div>
    <div class="products-grid" id="relatedProducts"></div>
  </section>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();
    document.getElementById('footer-container').innerHTML = renderFooter();

    const urlParams = new URLSearchParams(window.location.search);
    const productId = urlParams.get('id');
    const product = mockProducts.find(p => p.id === productId) || mockProducts[0];

    let selectedSize = product.sizes?.[0] || null;
    let selectedColor = product.colors?.[0] || null;
    let quantity = 1;

    function renderProductDetail() {
      const discount = product.originalPrice 
        ? Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100) 
        : 0;

      document.getElementById('productDetail').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start">
          <!-- Product Images -->
          <div>
            <div class="glass-card" style="overflow:hidden;margin-bottom:1rem">
              <img src="${product.images?.[0] || 'images/placeholder.jpg'}" 
                   alt="${product.name}" style="width:100%;aspect-ratio:3/4;object-fit:cover" id="mainImage">
            </div>
            <div style="display:flex;gap:0.5rem">
              ${product.images?.map((img, i) => `
                <div class="glass-card" style="width:80px;height:80px;overflow:hidden;cursor:pointer;border:${i===0?'2px solid var(--primary)':'var(--glass-border)'}" 
                     onclick="changeImage('${img}', this)">
                  <img src="${img}" style="width:100%;height:100%;object-fit:cover">
                </div>
              `).join('') || ''}
            </div>
          </div>

          <!-- Product Info -->
          <div>
            <div style="margin-bottom:1rem">
              <span style="color:var(--primary);font-weight:600;font-size:0.9rem;text-transform:uppercase">${product.category}</span>
            </div>
            <h1 style="font-size:2rem;margin-bottom:0.5rem">${product.name}</h1>
            <div class="product-rating" style="margin-bottom:1rem">
              <span class="stars">${'★'.repeat(Math.floor(product.rating || 0))}${'☆'.repeat(5 - Math.floor(product.rating || 0))}</span>
              <span class="rating-count">(${product.reviewCount || 0} reviews)</span>
            </div>
            <div class="product-price" style="margin-bottom:1.5rem">
              <span class="price-current" style="font-size:1.8rem">${CONFIG.currency} ${product.price.toLocaleString()}</span>
              ${product.originalPrice ? `<span class="price-original">${CONFIG.currency} ${product.originalPrice.toLocaleString()}</span>` : ''}
              ${discount > 0 ? `<span class="price-discount">Save ${discount}%</span>` : ''}
            </div>

            <p style="color:var(--text-secondary);margin-bottom:1.5rem;line-height:1.7">
              Experience the beauty of authentic Sri Lankan batik with this exquisite piece. 
              Handcrafted by skilled artisans using traditional wax-resist dyeing techniques, 
              each item is a unique work of art that celebrates our rich cultural heritage.
            </p>

            ${product.colors ? `
              <div style="margin-bottom:1.5rem">
                <h4 style="margin-bottom:0.5rem">Color: <span style="color:var(--primary)">${selectedColor}</span></h4>
                <div style="display:flex;gap:0.5rem">
                  ${product.colors.map(c => `
                    <button onclick="selectColor('${c}', this)" 
                            style="width:35px;height:35px;border-radius:50%;border:3px solid ${selectedColor===c?'var(--primary)':'transparent'};background:${getColorCode(c)};cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.1)"
                            title="${c}"></button>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            ${product.sizes && product.sizes[0] !== 'Free' && product.sizes[0] !== 'Standard' ? `
              <div style="margin-bottom:1.5rem">
                <h4 style="margin-bottom:0.5rem">Size: <span style="color:var(--primary)">${selectedSize}</span></h4>
                <div style="display:flex;gap:0.5rem">
                  ${product.sizes.map(s => `
                    <button onclick="selectSize('${s}', this)" 
                            style="padding:0.5rem 1rem;border-radius:8px;border:2px solid ${selectedSize===s?'var(--primary)':'var(--border-color)'};background:${selectedSize===s?'var(--primary)':'var(--bg-card)'};color:${selectedSize===s?'white':'var(--text-primary)'};cursor:pointer;font-weight:600;transition:var(--transition)">${s}</button>
                  `).join('')}
                </div>
              </div>
            ` : ''}

            <div style="margin-bottom:1.5rem">
              <h4 style="margin-bottom:0.5rem">Quantity</h4>
              <div class="quantity-control" style="width:fit-content">
                <button onclick="updateQuantity(-1)">-</button>
                <span id="qtyDisplay">${quantity}</span>
                <button onclick="updateQuantity(1)">+</button>
              </div>
            </div>

            <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
              <button class="btn btn-primary btn-lg" style="flex:1;min-width:200px" onclick="addToCart()">
                <i class="fas fa-shopping-cart"></i> Add to Cart
              </button>
              <button class="btn btn-outline btn-lg" style="flex:1;min-width:200px" onclick="addToWishlist()">
                <i class="fas fa-heart"></i> Add to Wishlist
              </button>
            </div>

            <div style="padding:1rem;background:var(--bg-secondary);border-radius:12px">
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
                <i class="fas fa-check-circle" style="color:var(--success)"></i>
                <span>${product.stock > 0 ? `In Stock (${product.stock} available)` : 'Out of Stock'}</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem">
                <i class="fas fa-truck" style="color:var(--info)"></i>
                <span>Free delivery on orders over LKR 5,000</span>
              </div>
              <div style="display:flex;align-items:center;gap:0.5rem">
                <i class="fas fa-shield-alt" style="color:var(--primary)"></i>
                <span>Authentic Sri Lankan Batik - Certificate Included</span>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function changeImage(src, thumb) {
      document.getElementById('mainImage').src = src;
      thumb.parentElement.querySelectorAll('.glass-card').forEach(t => t.style.border = 'var(--glass-border)');
      thumb.style.border = '2px solid var(--primary)';
    }

    function selectColor(color, btn) {
      selectedColor = color;
      renderProductDetail();
    }

    function selectSize(size, btn) {
      selectedSize = size;
      renderProductDetail();
    }

    function updateQuantity(change) {
      quantity = Math.max(1, Math.min(product.stock, quantity + change));
      document.getElementById('qtyDisplay').textContent = quantity;
    }

    function addToCart() {
      if (product.stock <= 0) {
        Toast.error('Product is out of stock');
        return;
      }
      State.addToCart(product, quantity, selectedSize, selectedColor);
    }

    function addToWishlist() {
      State.toggleWishlist(product);
    }

    function getColorCode(color) {
      const colors = {
        'Red': '#C62828', 'Gold': '#D4AF37', 'Maroon': '#800000',
        'Blue': '#1565C0', 'Green': '#2E7D32', 'Brown': '#5D4037',
        'Pink': '#E91E63', 'Purple': '#7B1FA2', 'Orange': '#F57C00',
        'Black': '#212121', 'Navy': '#1A237E', 'Multi': 'linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1)'
      };
      return colors[color] || '#ccc';
    }

    renderProductDetail();

    // Related products
    const related = mockProducts.filter(p => p.category === product.category && p.id !== product.id).slice(0, 4);
    document.getElementById('relatedProducts').innerHTML = related.map(p => UI.renderProductCard(p)).join('');

    initScrollAnimations();
  </script>
</body>
</html>
