<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Batik Lanka</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="section" style="padding-top:2rem">
    <h1 class="section-title" data-i18n="checkout.title">Checkout</h1>

    <div style="display:grid;grid-template-columns:1fr 400px;gap:2rem;align-items:start">
      <div>
        <!-- Billing Information -->
        <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem">
          <h3 style="margin-bottom:1.5rem"><i class="fas fa-user"></i> <span data-i18n="checkout.billing_info">Billing Information</span></h3>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.full_name">Full Name</label>
              <input type="text" class="form-input" id="billingName" required>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.email">Email</label>
              <input type="email" class="form-input" id="billingEmail" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.phone">Phone</label>
              <input type="tel" class="form-input" id="billingPhone" required>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.city">City</label>
              <input type="text" class="form-input" id="billingCity" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" data-i18n="checkout.address">Address</label>
            <textarea class="form-input" id="billingAddress" rows="3" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.postal_code">Postal Code</label>
              <input type="text" class="form-input" id="billingPostal">
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.country">Country</label>
              <input type="text" class="form-input" value="Sri Lanka" readonly>
            </div>
          </div>
        </div>

        <!-- Shipping Information -->
        <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
            <h3><i class="fas fa-truck"></i> <span data-i18n="checkout.shipping_info">Shipping Information</span></h3>
            <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.9rem">
              <input type="checkbox" id="sameAsBilling" checked onchange="toggleShipping()">
              <span data-i18n="checkout.same_as_billing">Same as billing</span>
            </label>
          </div>
          <div id="shippingFields" style="display:none">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="shippingName">
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <input type="tel" class="form-input" id="shippingPhone">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Address</label>
              <textarea class="form-input" id="shippingAddress" rows="3"></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" class="form-input" id="shippingCity">
              </div>
              <div class="form-group">
                <label class="form-label">Postal Code</label>
                <input type="text" class="form-input" id="shippingPostal">
              </div>
            </div>
          </div>
        </div>

        <!-- Payment Method -->
        <div class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem">
          <h3 style="margin-bottom:1.5rem"><i class="fas fa-credit-card"></i> <span data-i18n="checkout.payment_method">Payment Method</span></h3>

          <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
            <label style="flex:1;min-width:150px;padding:1rem;border:2px solid var(--border-color);border-radius:12px;cursor:pointer;text-align:center;transition:var(--transition)" 
                   onmouseover="this.style.borderColor='var(--primary)'" onmouseout="if(!this.querySelector('input').checked)this.style.borderColor='var(--border-color)'"
                   id="codLabel">
              <input type="radio" name="payment" value="cod" checked style="display:none" onchange="togglePayment('cod')">
              <i class="fas fa-money-bill-wave" style="font-size:1.5rem;color:var(--primary);margin-bottom:0.5rem;display:block"></i>
              <span style="font-weight:600" data-i18n="checkout.cash_on_delivery">Cash on Delivery</span>
            </label>
            <label style="flex:1;min-width:150px;padding:1rem;border:2px solid var(--border-color);border-radius:12px;cursor:pointer;text-align:center;transition:var(--transition)"
                   onmouseover="this.style.borderColor='var(--primary)'" onmouseout="if(!this.querySelector('input').checked)this.style.borderColor='var(--border-color)'"
                   id="onlineLabel">
              <input type="radio" name="payment" value="online" style="display:none" onchange="togglePayment('online')">
              <i class="fas fa-credit-card" style="font-size:1.5rem;color:var(--primary);margin-bottom:0.5rem;display:block"></i>
              <span style="font-weight:600" data-i18n="checkout.online_payment">Online Payment</span>
              <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem">PayHere / Visa / MasterCard</div>
            </label>
          </div>

          <div id="onlinePaymentFields" style="display:none">
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.card_number">Card Number</label>
              <input type="text" class="form-input" placeholder="1234 5678 9012 3456" maxlength="19">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" data-i18n="checkout.expiry">Expiry Date</label>
                <input type="text" class="form-input" placeholder="MM/YY" maxlength="5">
              </div>
              <div class="form-group">
                <label class="form-label">CVV</label>
                <input type="text" class="form-input" placeholder="123" maxlength="3">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="checkout.name_on_card">Name on Card</label>
              <input type="text" class="form-input">
            </div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" data-i18n="checkout.notes">Order Notes (Optional)</label>
          <textarea class="form-input" id="orderNotes" rows="3" placeholder="Special instructions for delivery..."></textarea>
        </div>
      </div>

      <!-- Order Summary -->
      <div class="glass-card" style="padding:1.5rem;position:sticky;top:90px">
        <h3 style="margin-bottom:1.5rem" data-i18n="checkout.order_summary">Order Summary</h3>

        <div id="orderItems" style="max-height:300px;overflow-y:auto;margin-bottom:1rem">
          <!-- Items rendered by JS -->
        </div>

        <hr style="border:none;border-top:1px solid var(--border-color);margin:1rem 0">

        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
          <span>Subtotal</span>
          <span id="summarySubtotal">${CONFIG.currency} 0</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem">
          <span>Delivery</span>
          <span id="summaryDelivery">${CONFIG.currency} 0</span>
        </div>
        <div style="display:flex;justify-content:space-between;margin-bottom:1rem">
          <span>Discount</span>
          <span id="summaryDiscount">-${CONFIG.currency} 0</span>
        </div>

        <hr style="border:none;border-top:1px solid var(--border-color);margin:1rem 0">

        <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem">
          <span style="font-size:1.1rem;font-weight:700">Total</span>
          <span style="font-size:1.3rem;font-weight:700;color:var(--primary)" id="summaryTotal">${CONFIG.currency} 0</span>
        </div>

        <button class="btn btn-primary btn-lg" style="width:100%" onclick="placeOrder()" data-i18n="checkout.place_order">Place Order</button>
      </div>
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();
    document.getElementById('footer-container').innerHTML = renderFooter();

    function renderOrderSummary() {
      const itemsContainer = document.getElementById('orderItems');
      const subtotal = State.getCartTotal();
      const delivery = subtotal > 5000 ? 0 : CONFIG.deliveryCharge;
      const total = subtotal + delivery;

      itemsContainer.innerHTML = State.cart.map(item => `
        <div style="display:flex;gap:1rem;margin-bottom:0.8rem;align-items:center">
          <img src="${item.images?.[0] || 'images/placeholder.jpg'}" style="width:50px;height:50px;object-fit:cover;border-radius:8px">
          <div style="flex:1">
            <p style="font-size:0.85rem;font-weight:600;margin:0">${item.name}</p>
            <p style="font-size:0.75rem;color:var(--text-muted);margin:0">Qty: ${item.quantity}</p>
          </div>
          <span style="font-weight:600;font-size:0.9rem">${CONFIG.currency} ${((item.discountPrice || item.price) * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');

      document.getElementById('summarySubtotal').textContent = `${CONFIG.currency} ${subtotal.toLocaleString()}`;
      document.getElementById('summaryDelivery').textContent = delivery === 0 ? 'FREE' : `${CONFIG.currency} ${delivery.toLocaleString()}`;
      document.getElementById('summaryTotal').textContent = `${CONFIG.currency} ${total.toLocaleString()}`;
    }

    function toggleShipping() {
      const shippingFields = document.getElementById('shippingFields');
      const sameAsBilling = document.getElementById('sameAsBilling').checked;
      shippingFields.style.display = sameAsBilling ? 'none' : 'block';
    }

    function togglePayment(method) {
      const onlineFields = document.getElementById('onlinePaymentFields');
      const codLabel = document.getElementById('codLabel');
      const onlineLabel = document.getElementById('onlineLabel');

      if (method === 'online') {
        onlineFields.style.display = 'block';
        codLabel.style.borderColor = 'var(--border-color)';
        onlineLabel.style.borderColor = 'var(--primary)';
      } else {
        onlineFields.style.display = 'none';
        codLabel.style.borderColor = 'var(--primary)';
        onlineLabel.style.borderColor = 'var(--border-color)';
      }
    }

    async function placeOrder() {
      const billingName = document.getElementById('billingName').value;
      const billingEmail = document.getElementById('billingEmail').value;
      const billingPhone = document.getElementById('billingPhone').value;
      const billingAddress = document.getElementById('billingAddress').value;
      const billingCity = document.getElementById('billingCity').value;

      if (!billingName || !billingEmail || !billingPhone || !billingAddress || !billingCity) {
        Toast.error('Please fill in all required fields');
        return;
      }

      const paymentMethod = document.querySelector('input[name="payment"]:checked').value;
      const subtotal = State.getCartTotal();
      const delivery = subtotal > 5000 ? 0 : CONFIG.deliveryCharge;
      const total = subtotal + delivery;

      const orderData = {
        items: State.cart,
        subtotal,
        delivery,
        total,
        billingInfo: {
          name: billingName,
          email: billingEmail,
          phone: billingPhone,
          address: billingAddress,
          city: billingCity,
          postalCode: document.getElementById('billingPostal').value
        },
        notes: document.getElementById('orderNotes').value,
        paymentMethod
      };

      try {
        if (paymentMethod === 'cod') {
          const orderId = await Payment.processCOD(orderData);
          State.cart = [];
          State.saveCart();
          Toast.success('Order placed successfully!');
          window.location.href = `orders.html?order=${orderId}`;
        } else {
          // Online payment via PayHere
          await Payment.processPayHere({
            ...orderData,
            orderId: 'ORDER_' + Date.now(),
            firstName: billingName.split(' ')[0],
            lastName: billingName.split(' ').slice(1).join(' ') || billingName,
            email: billingEmail,
            phone: billingPhone,
            address: billingAddress,
            city: billingCity,
            amount: total
          });
        }
      } catch (error) {
        Toast.error(error.message || 'Failed to place order');
      }
    }

    renderOrderSummary();
  </script>
</body>
</html>
