<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - Batik Lanka</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <div class="auth-container">
    <div class="glass-card auth-card">
      <div class="auth-header">
        <div class="logo-icon" style="width:60px;height:60px;font-size:1.8rem;margin:0 auto 1rem">BL</div>
        <h2 data-i18n="auth.reset_password">Reset Password</h2>
        <p>Enter your email to receive a reset link</p>
      </div>

      <form id="resetForm" onsubmit="handleReset(event)">
        <div class="form-group">
          <label class="form-label" data-i18n="auth.email">Email Address</label>
          <input type="email" class="form-input" id="resetEmail" required placeholder="your@email.com">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" data-i18n="auth.send_reset">Send Reset Link</button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;color:var(--text-muted)">
        <a href="login.html" style="color:var(--primary);font-weight:600;text-decoration:none">
          <i class="fas fa-arrow-left"></i> Back to Login
        </a>
      </p>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();

    async function handleReset(e) {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;

      try {
        await Firebase.resetPassword(email);
        Toast.success('Reset link sent to your email!');
      } catch (error) {
        Toast.error(error.message);
      }
    }
  </script>
</body>
</html>
