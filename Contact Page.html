<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - Batik Lanka</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="navbar-container"></div>

<section class="section" style="padding-top:2rem">
<h1 class="section-title" data-i18n="contact.title">Contact Us</h1>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem">
<div>
<div class="glass-card" style="padding:2rem;margin-bottom:1.5rem">
<h3 style="margin-bottom:1.5rem"><i class="fas fa-envelope"></i> <span data-i18n="contact.send">Send Message</span></h3>
<form onsubmit="handleContact(event)">
<div class="form-group">
<label class="form-label" data-i18n="contact.name">Your Name</label>
<input type="text" class="form-input" required>
</div>
<div class="form-group">
<label class="form-label" data-i18n="contact.email">Your Email</label>
<input type="email" class="form-input" required>
</div>
<div class="form-group">
<label class="form-label" data-i18n="contact.subject">Subject</label>
<input type="text" class="form-input" required>
</div>
<div class="form-group">
<label class="form-label" data-i18n="contact.message">Your Message</label>
<textarea class="form-input" rows="5" required></textarea>
</div>
<button type="submit" class="btn btn-primary" style="width:100%"><i class="fas fa-paper-plane"></i> <span data-i18n="contact.send">Send Message</span></button>
</form>
</div>
</div>

<div>
<div class="glass-card" style="padding:2rem;margin-bottom:1.5rem">
<h3 style="margin-bottom:1.5rem"><i class="fas fa-map-marker-alt"></i> <span data-i18n="contact.address">Our Address</span></h3>
<p style="margin-bottom:1rem"><i class="fas fa-building" style="color:var(--primary);width:25px"></i> 123 Batik Street, Colombo 03, Sri Lanka</p>
<p style="margin-bottom:1rem"><i class="fas fa-phone" style="color:var(--primary);width:25px"></i> +94 11 234 5678</p>
<p style="margin-bottom:1rem"><i class="fas fa-envelope" style="color:var(--primary);width:25px"></i> info@batiklanka.lk</p>
<p><i class="fas fa-clock" style="color:var(--primary);width:25px"></i> <span data-i18n="contact.hours">Mon - Sat: 9:00 AM - 6:00 PM</span></p>
</div>

<div class="glass-card" style="padding:2rem">
<h3 style="margin-bottom:1rem">Follow Us</h3>
<div class="social-links">
<a href="#"><i class="fab fa-facebook-f"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-whatsapp"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
</div>
</div>
</div>
</div>
</section>

<div id="footer-container"></div>

<script src="js/main.js"></script>
<script>
document.getElementById('navbar-container').innerHTML = renderNavbar();
document.getElementById('footer-container').innerHTML = renderFooter();

async function handleContact(e) {
e.preventDefault();
try {
await Firebase.submitContact({
name: e.target[0].value,
email: e.target[1].value,
subject: e.target[2].value,
message: e.target[3].value
});
Toast.success('Message sent successfully!');
e.target.reset();
} catch (error) {
Toast.error('Failed to send message');
}
}
</script>
</body>
</html>
