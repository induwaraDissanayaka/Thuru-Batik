<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Batik Lanka</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbar-container"></div>

  <section class="section" style="padding-top:2rem">
    <h1 class="section-title" data-i18n="cart.title">Shopping Cart</h1>

    <div id="cartContent">
      <!-- Cart content rendered by JS -->
    </div>
  </section>

  <div id="footer-container"></div>

  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-container').innerHTML = renderNavbar();
    document.getElementById('footer-container').innerHTML = renderFooter();

    function renderCart() {
      const container = document.getElementById('cartContent');

      if (State.cart.length === 0) {
        container.innerHTML = `
          <div style="text-align:center;padding:4rem">
            <i class="fas fa-shopping-cart" style="font-size:4rem;color:var(--text-muted);margin-bottom:1rem"></i>
            <h2 data-i18n="cart.empty">Your cart is empty</h2>
            <p style="color:var(--text-muted);margin-bottom:2rem">Looks like you haven't added anything yet.</p>
            <a href="products.html" class="btn btn-primary btn-lg" data-i18n="cart.continue_shopping">Continue Shopping</a>
          </div>
        `;
        return;
      }

      const subtotal = State.getCartTotal();
      const delivery = subtotal > 5000 ? 0 : CONFIG.deliveryCharge;
      const total = subtotal + delivery;

      container.innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 350px;gap:2rem;align-items:start">
          <div>
            <div id="cartItems">
              ${State.cart.map((item, index) => UI.renderCartItem(item, index)).join('')}
            </div>
            <div style="margin-top:1rem">
              <a href="products.html" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> <span data-i18n="cart.continue_shopping">Continue Shopping</span>
              </a>
            </div>
          </div>

          <div class="glass-card" style="padding:1.5rem;position:sticky;top:90px">
            <h3 style="margin-bottom:1.5rem">Order Summary</h3>

            <div style="display:flex;justify-content:space-between;margin-bottom:0.8rem">
              <span data-i18n="cart.subtotal">Subtotal</span>
              <span style="font-weight:600">${CONFIG.currency} ${subtotal.toLocaleString()}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:0.8rem">
              <span data-i18n="cart.delivery">Delivery</span>
              <span style="font-weight:600">${delivery === 0 ? 'FREE' : CONFIG.currency + ' ' + delivery.toLocaleString()}</span>
            </div>

            <div style="display:flex;gap:0.5rem;margin-bottom:1rem">
              <input type="text" class="form-input" placeholder="Coupon Code" style="flex:1" id="couponCode">
              <button class="btn btn-outline btn-sm" onclick="applyCoupon()" data-i18n="cart.apply_coupon">Apply</button>
            </div>

            <hr style="border:none;border-top:1px solid var(--border-color);margin:1rem 0">

            <div style="display:flex;justify-content:space-between;margin-bottom:1.5rem">
              <span style="font-size:1.1rem;font-weight:700">Total</span>
              <span style="font-size:1.3rem;font-weight:700;color:var(--primary)">${CONFIG.currency} ${total.toLocaleString()}</span>
            </div>

            <a href="checkout.html" class="btn btn-primary btn-lg" style="width:100%" data-i18n="cart.checkout">Proceed to Checkout</a>

            <div style="margin-top:1rem;display:flex;justify-content:center;gap:0.5rem;font-size:0.85rem;color:var(--text-muted)">
              <i class="fas fa-lock"></i> Secure Checkout
            </div>
          </div>
        </div>
      `;
    }

    function applyCoupon() {
      const code = document.getElementById('couponCode').value.trim();
      if (!code) return;

      // Mock coupon validation
      const validCoupons = {
        'BATIK10': 0.10,
        'WELCOME20': 0.20,
        'SUMMER15': 0.15
      };

      if (validCoupons[code.toUpperCase()]) {
        Toast.success(`Coupon applied! ${validCoupons[code.toUpperCase()] * 100}% discount`);
      } else {
        Toast.error('Invalid coupon code');
      }
    }

    EventBus.on('cart:updated', renderCart);
    renderCart();
  </script>
</body>
</html>
